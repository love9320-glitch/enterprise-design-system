<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시판</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">

    <!-- 목록 화면 -->
    <div id="view-list">
      <header>
        <h1>게시판</h1>
        <button onclick="showWrite()">글쓰기</button>
      </header>
      <table id="post-table">
        <thead>
          <tr>
            <th>번호</th><th>제목</th><th>작성자</th><th>날짜</th>
          </tr>
        </thead>
        <tbody id="post-list"></tbody>
      </table>
      <p id="empty-msg" class="empty" style="display:none">등록된 글이 없습니다.</p>
    </div>

    <!-- 작성 화면 -->
    <div id="view-write" style="display:none">
      <header>
        <h1>글쓰기</h1>
        <button class="secondary" onclick="showList()">목록으로</button>
      </header>
      <form id="write-form">
        <label>제목</label>
        <input type="text" id="input-title" placeholder="제목을 입력하세요" required>
        <label>작성자</label>
        <input type="text" id="input-author" placeholder="작성자 (기본: 익명)">
        <label>내용</label>
        <textarea id="input-content" rows="8" placeholder="내용을 입력하세요" required></textarea>
        <div class="form-actions">
          <button type="submit">등록</button>
          <button type="button" class="secondary" onclick="showList()">취소</button>
        </div>
      </form>
    </div>

    <!-- 상세 화면 -->
    <div id="view-detail" style="display:none">
      <header>
        <h1 id="detail-title"></h1>
        <button class="secondary" onclick="showList()">목록으로</button>
      </header>
      <div class="meta">
        <span id="detail-author"></span>
        <span id="detail-date"></span>
      </div>
      <div id="detail-content" class="content-body"></div>
      <div class="form-actions">
        <button class="danger" onclick="deletePost()">삭제</button>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
